<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevDocs – Learn Programming</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-brand">
      <span class="brand-icon">&#10094;&#47;&#10095;</span>
      <span class="brand-name">DevDocs</span>
    </div>
    <nav class="topic-nav" id="topicNav">
      <button class="topic-btn active" data-topic="java">Java</button>
      <button class="topic-btn" data-topic="python">Python</button>
      <button class="topic-btn" data-topic="springboot">Spring Boot</button>
      <button class="topic-btn" data-topic="sql">SQL</button>
      <button class="topic-btn" data-topic="dsa">DSA</button>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
  </header>

  <!-- ===== LAYOUT ===== -->
  <div class="layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title" id="sidebarTitle">Java Tutorial</div>
      <nav class="chapter-nav" id="chapterNav"></nav>
    </aside>

    <!-- OVERLAY for mobile -->
    <div class="overlay" id="overlay"></div>

    <!-- MAIN CONTENT -->
    <main class="content" id="mainContent">
      <div class="content-inner" id="contentInner">
        <!-- Injected by JS -->
      </div>
    </main>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
